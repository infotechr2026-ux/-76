<!DOCTYPE html>
<html lang="am">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#004d40">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="System 76 - የተሽከርካሪ ክፍያ ማስገቢያ ሲስተም">
    <title>System 76 - ክፍያ ማስገቢያ</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23004d40'/><text x='50' y='68' text-anchor='middle' font-size='55' fill='white'>🚗</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #004d40;
            --secondary: #00796b;
            --accent: #00bfa5;
            --success: #2e7d32;
            --warning: #f57c00;
            --danger: #c62828;
        }

        body {
            font-family: 'Segoe UI', 'Nyala', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #004d40 0%, #00796b 50%, #00bfa5 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            padding: 28px 24px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #004d40, #00796b);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 6px 20px rgba(0, 77, 64, 0.35);
        }

        .logo-circle i {
            font-size: 32px;
            color: white;
        }

        .header h2 {
            color: #004d40;
            font-weight: 800;
            font-size: 1.5rem;
        }

        .header .subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            color: #1e293b;
        }

        label i {
            color: #004d40;
            width: 16px;
        }

        label.required::after {
            content: ' *';
            color: #c62828;
        }

        input,
        select {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            border-color: #004d40;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 77, 64, 0.08);
        }

        input[readonly] {
            background: #f0f4f4;
            font-weight: 500;
        }

        .amount-box {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border: 3px solid #2e7d32;
            color: #1b5e20;
            font-weight: 900;
            font-size: 2.2rem;
            text-align: center;
            padding: 22px;
            border-radius: 16px;
            transition: all 0.3s;
            word-break: break-word;
        }

        .amount-box.highlight {
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.95);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        .fee-detail {
            background: #fff3e0;
            border-left: 5px solid #f57c00;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 0.85rem;
            color: #e65100;
            line-height: 1.6;
            display: none;
        }

        .fee-detail.visible {
            display: block;
        }

        .alert-box {
            background: #ffebee;
            border-left: 5px solid #c62828;
            padding: 10px 14px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 0.82rem;
            color: #c62828;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            margin-top: 12px;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-pay {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            box-shadow: 0 5px 18px rgba(46, 125, 50, 0.3);
            font-size: 1.15rem;
        }

        .btn-reset {
            background: linear-gradient(135deg, #f57c00, #ff9800);
            box-shadow: 0 5px 18px rgba(245, 124, 0, 0.3);
        }

        .btn-link {
            background: transparent;
            color: #004d40;
            border: 2px solid #004d40;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .btn-share {
            background: #25D366;
        }

        .btn-telegram {
            background: #0088cc;
        }

        .btn-print {
            background: #5d4037;
        }

        .receipt-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #b2dfdb;
            display: none;
            animation: slideUp 0.35s ease;
        }

        .receipt-panel.show {
            display: block;
        }

        .receipt-panel h4 {
            color: #004d40;
            margin-bottom: 12px;
        }

        .receipt-panel table {
            width: 100%;
            border-collapse: collapse;
        }

        .receipt-panel td {
            padding: 8px 6px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.9rem;
        }

        .receipt-panel td:first-child {
            font-weight: 600;
            width: 40%;
        }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .action-row .btn {
            flex: 1;
            min-width: 70px;
            padding: 10px;
            font-size: 0.85rem;
            margin-top: 0;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .toast.visible {
            opacity: 1;
            visibility: visible;
        }

        .toast.success {
            background: #2e7d32;
        }

        .toast.error {
            background: #c62828;
        }

        .hint-text {
            font-size: 0.75rem;
            color: #888;
            margin-top: 3px;
        }

        hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 16px 0;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 18px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 8px;
            color: #004d40;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 400px) {
            .card {
                padding: 20px 16px;
            }

            .amount-box {
                font-size: 1.6rem;
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">

            <h2>System 76</h2>

        <hr>
        <div class="form-group">

        </div>
        <div class="form-group">
            <label class="required"><i class="fas fa-calendar-alt"></i> የምርመራ ቀን</label>
            <input type="text" id="dateInput" placeholder="04/07/2018" autocomplete="off">
            <div class="hint-text">ቅርጸት: ቀን/ወር/ዓመት</div>

        <div class="form-group">
            <label class="required"><i class="fas fa-truck"></i> የተሽከርካሪ ዓይነት</label>
            <select id="vehicleType">
                <option value="">-- ይምረጡ --</option>
                <optgroup label="መንገደኞች">
                    <option value="2.3.1">ሞተር/ባጃጅ</option>

        <hr>
        <div class="form-group">
            <label><i class="fas fa-calculator"></i> 💰 ራስ-ሰር የተሰላ ክፍያ</label>
            <div class="amount-box" id="calculatedAmount">--</div>

        <button class="btn btn-pay" onclick="processPayment()">
            <i class="fas fa-check-circle"></i> ክፍያ አስገባ
        </button>
        <button class="btn btn-reset" onclick="resetForm()">
            <i class="fas fa-redo-alt"></i> አዲስ ክፍያ

        <!-- ወደ ዋና ሲስተም መመለሻ ሊንክ -->
        <a href="./index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> ወደ ዋና ሲስተም ተመለስ
        </a>

        <div class="receipt-panel" id="receiptCard">
            <h4><i class="fas fa-receipt"></i> 🧾 ደረሰኝ</h4>

            </div>

        <div class="footer-note">System 76 © 2024</div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker ተመዝግቧል'))
                    .catch(err => console.log('Service Worker አልተመዘገበም'));

    </script>

    <script>
        (function () {
            'use strict';

            // ========== የኢትዮጵያ ቀን መቁጠሪያ ==========
            const EthCal = {
                toJDN: (d, m, y) => 1724221 + 365 * (y - 1) + Math.floor(y / 4) + 30 * m + d - 31,
                jdnToGreg: jdn => {
                    let l = jdn + 68569, n = Math.floor(4 * l / 146097);
                    l -= Math.floor((146097 * n + 3) / 4);
                    let i = Math.floor(4000 * (l + 1) / 1461001);
                    l = l - Math.floor(1461 * i / 4) + 31;
                    let j = Math.floor(80 * l / 2447), day = l - Math.floor(2447 * j / 80);
                    l = Math.floor(j / 11);
                    return { year: 100 * (n - 49) + i + l, month: j + 2 - 12 * l, day };
                },
                toGreg: (d, m, y) => EthCal.jdnToGreg(EthCal.toJDN(d, m, y)),
                fromGreg: (y, m, d) => {
                    const jdn = Math.floor((y + Math.floor((m - 14) / 12)) * 365.25) + Math.floor(30.6001 * ((m % 12) + 1)) + d + 1720995;
                    const r = jdn - 1724221, n = Math.floor(r / 146097), rem = r % 146097;
                    const yp = Math.floor(rem / 365.25), dp = rem % 365.25;
                    return { year: n * 400 + yp + 1, month: Math.floor(dp / 30) + 1, day: Math.floor(dp % 30) + 1 };
                },
                todayEth: () => {
                    const t = new Date();
                    return EthCal.fromGreg(t.getFullYear(), t.getMonth() + 1, t.getDate());
                },
                workingDays: dateStr => {
                    const p = dateStr.split('/');
                    if (p.length !== 3) return -1;
                    const d = parseInt(p[0]), m = parseInt(p[1]), y = parseInt(p[2]);
                    if (isNaN(d) || isNaN(m) || isNaN(y)) return -1;
                    const g = EthCal.toGreg(d, m, y);
                    const start = new Date(g.year, g.month - 1, g.day), today = new Date();
                    today.setHours(0, 0, 0, 0);
                    let cnt = 0, cur = new Date(start); cur.setDate(cur.getDate() + 1);
                    while (cur <= today) { if (cur.getDay() !== 0 && cur.getDay() !== 6) cnt++; cur.setDate(cur.getDate() + 1); }
                    return cnt;
                }
            };

            // ========== የክፍያ ሰንጠረዥ ==========
            const Fees = {
                '2.3.1': { name: 'ሞተር/ባጃጅ', rates: [400, 600, 800] },
                '2.3.2': { name: 'አነስተኛ', rates: [600, 800, 1000] },
                '2.3.3': { name: 'መለስተኛ', rates: [800, 1000, 1200] },
                '2.3.4': { name: 'ከፍተኛ', rates: [1000, 1200, 1500] },
                '2.3.5': { name: 'ደረቅ 1', rates: [800, 1000, 1200] },
                '2.3.6': { name: 'ደረቅ 2', rates: [1000, 1200, 2000] },
                '2.3.7': { name: 'ደረቅ 3', rates: [1000, 2500, 3500] },
                '2.3.8': { name: 'ከባድ', rates: [1500, 3000, 4000] },
                '2.3.9': { name: 'ፈሳሽ', rates: [1000, 2500, 3500] }
            };

            // ========== ከዋና ሲስተም IndexedDB ጋር ግንኙነት ==========
            const DB_NAME = 'TECH_SYSTEM_DB', DB_VERSION = 1;
            let db = null;

            function openDB() {
                return new Promise((res, rej) => {
                    const req = indexedDB.open(DB_NAME, DB_VERSION);
                    req.onupgradeneeded = e => {
                        const d = e.target.result;
                        if (!d.objectStoreNames.contains('main')) d.createObjectStore('main', { keyPath: 'id', autoIncrement: true });
                        if (!d.objectStoreNames.contains('trash')) d.createObjectStore('trash', { keyPath: 'id', autoIncrement: true });
                    };
                    req.onsuccess = e => { db = e.target.result; res(); };
                    req.onerror = e => rej(e);
                });
            }

            function normalizeDate(dateStr) {
                if (!dateStr) return '';
                let n = String(dateStr).trim();
                if (n.includes('(')) n = n.split('(')[0].trim();
                while (n.startsWith('/')) n = n.substring(1);
                n = n.replace(/ዓ\.ም/g, '').replace(/\s+/g, ' ').trim();
                const p = n.split('/');
                if (p.length === 3) {
                    let day = p[0].padStart(2, '0'), month = p[1].padStart(2, '0'), year = p[2];
                    if (year.length === 2) year = '20' + year;
                    else if (year.length === 3) year = '2' + year;
                    else if (year.length > 4) {
                        if (year.length === 5) year = year.substring(0, 4);
                        else if (year.length === 6 && year.startsWith('0')) year = year.substring(2);
                        else year = year.substring(0, 4);
                    }
                    let yn = parseInt(year, 10);
                    if (yn < 1900) yn += 2000; else if (yn > 2100) yn = 2000 + (yn % 100);
                    year = yn.toString();
                    n = `${day}/${month}/${year}`;
                }
                return n.trim();
            }

            const normPlate = s => (s || '').toString().trim().toUpperCase().replace(/[- ]/g, '');

            // ✅ የሚዘመነው የክፍያ መጠን ብቻ ነው (ተሽከርካሪውን አይለውጥም)
            function findAndUpdatePayment(plate, date, amtToAdd) {
                if (!db) return Promise.reject(new Error('DB not open'));
                return new Promise((res, rej) => {
                    const tx = db.transaction('main', 'readwrite'), store = tx.objectStore('main');
                    const getAllReq = store.getAll();
                    getAllReq.onsuccess = e => {
                        const all = e.target.result || [];
                        const np = normPlate(plate), nd = normalizeDate(date);
                        const match = all.find(r => normPlate(r.plate) === np && normalizeDate(r.date) === nd);
                        if (!match) return res({ success: false });
                        const prev = parseFloat(match.amount) || 0;
                        // ክፍያውን ብቻ ጨምር፤ ሌላ መረጃ አትቀይር
                        match.amount = prev + amtToAdd;
                        const putReq = store.put(match);
                        putReq.onsuccess = () => res({ success: true, previousAmount: prev, newTotal: parseFloat(match.amount) });
                        putReq.onerror = e => rej(e);
                    };
                    getAllReq.onerror = e => rej(e);
                });
            }

            // ========== UI ==========
            const $ = id => document.getElementById(id);
            const plateEl = $('plateInput'), dateEl = $('dateInput'), typeEl = $('vehicleType'), locEl = $('locationSelect');
            const amtBox = $('calculatedAmount'), feeInfo = $('feeBreakdown');
            const receipt = $('receiptCard'), receiptBody = $('receiptContent'), toastEl = $('toast');

            let toastTimer, currentFee = null, lastReceipt = null;

            function toast(msg, cls) {
                toastEl.textContent = msg;
                toastEl.className = 'toast ' + (cls || 'success') + ' visible';
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 2800);
            }

            function calcFee() {
                const v = typeEl.value, d = dateEl.value.trim();
                if (!v || !d) { amtBox.textContent = '--'; amtBox.classList.remove('highlight'); feeInfo.classList.remove('visible'); currentFee = null; return; }
                const days = EthCal.workingDays(d);
                if (days < 0) { amtBox.textContent = 'ቀን አልተገኘም'; amtBox.classList.remove('highlight'); feeInfo.classList.remove('visible'); currentFee = null; return; }
                const f = Fees[v]; if (!f) { currentFee = null; return; }
                let amount, range;
                if (days <= 7) { amount = f.rates[0]; range = '0-7 ቀናት'; }
                else if (days <= 15) { amount = f.rates[1]; range = '8-15 ቀናት'; }
                else { amount = f.rates[2]; range = 'ከ15 በላይ'; }
                currentFee = amount;
                amtBox.textContent = amount.toLocaleString() + ' ብር';
                amtBox.classList.add('highlight');
                feeInfo.innerHTML = `📅 የስራ ቀናት: <b>${days}</b> (${range})<br>🚗 ዓይነት: <b>${f.name}</b><br>💰 ተመን: <b>${amount.toLocaleString()} ብር</b>`;
                feeInfo.classList.add('visible');
            }

            typeEl.addEventListener('change', calcFee);
            dateEl.addEventListener('input', calcFee);

            window.processPayment = async function () {
                const plate = plateEl.value.trim(), date = dateEl.value.trim();
                const vType = typeEl.value, loc = locEl.value;
                if (!plate) { toast('ሰሌዳ ያስገቡ', 'error'); plateEl.focus(); return; }
                if (!date) { toast('ቀን ያስገቡ', 'error'); dateEl.focus(); return; }
                if (!vType) { toast('ዓይነት ይምረጡ', 'error'); typeEl.focus(); return; }
                if (!currentFee) { toast('ቀንና ዓይነት ያረጋግጡ', 'error'); return; }

                const vName = Fees[vType]?.name || vType;
                try {
                    if (!db) await openDB();
                    // ⚠️ ለማስላት ብቻ እንጂ ወደ ዳታቤዝ አይፃፍም
                    const result = await findAndUpdatePayment(plate, date, currentFee);
                    if (!result.success) {
                        toast('መረጃው በሲስተሙ ውስጥ የለም፤ እባክዎ የተሽከርካሪውን ሙሉ መረጃ ያስገቡ', 'error');
                        return;
                    }
                    const prev = result.previousAmount, newTotal = result.newTotal;
                    const eth = EthCal.todayEth();
                    lastReceipt = {
                        plate, date, amount: currentFee, total: newTotal,
                        location: loc, vName,
                        rDate: `${eth.day}/${eth.month}/${eth.year}`
                    };
                    receiptBody.innerHTML = `<table>
                        <tr><td>ሰሌዳ</td><td><b>${plate}</b></td></tr>
                        <tr><td>ቀን</td><td>${date}</td></tr>
                        <tr><td>ዓይነት</td><td>${vName}</td></tr>
                        <tr><td>ቦታ</td><td>${loc}</td></tr>
                        <tr><td>የተከፈለ</td><td style="color:#2e7d32;font-weight:900;">${currentFee.toLocaleString()} ብር</td></tr>
                        <tr><td>ድምር</td><td><b>${newTotal.toLocaleString()} ብር</b></td></tr>
                        <tr><td>ደረሰኝ ቀን</td><td>${lastReceipt.rDate}</td></tr>
                    </table>`;
                    receipt.classList.add('show');
                    receipt.scrollIntoView({ behavior: 'smooth' });
                    toast(`✅ ${currentFee.toLocaleString()} ብር ተከፍሏል`);
                } catch (e) {
                    console.error(e);
                    toast('ስህተት ተፈጥሯል', 'error');
                }
            };

            window.resetForm = function () {
                plateEl.value = ''; dateEl.value = ''; typeEl.value = '';
                amtBox.textContent = '--'; amtBox.classList.remove('highlight');
                feeInfo.classList.remove('visible'); receipt.classList.remove('show');
                currentFee = null; lastReceipt = null;
                plateEl.focus();
            };

            window.shareWhatsApp = function () {
                if (!lastReceipt) return;
                const msg = `✅ *System 76*%0Aሰሌዳ: ${lastReceipt.plate}%0Aቀን: ${lastReceipt.date}%0Aየተከፈለ: ${lastReceipt.amount.toLocaleString()} ብር%0Aድምር: ${lastReceipt.total.toLocaleString()} ብር`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            window.shareTelegram = function () {
                if (!lastReceipt) return;
                const msg = `✅ System 76\nሰሌዳ: ${lastReceipt.plate}\nቀን: ${lastReceipt.date}\nየተከፈለ: ${lastReceipt.amount.toLocaleString()} ብር\nድምር: ${lastReceipt.total.toLocaleString()} ብር`;
                window.open(`https://t.me/share/url?url=&text=${encodeURIComponent(msg)}`, '_blank');
            };

            // ✅ ማተሚያው ያለ ምንም ስህተት ይሰራል
            window.printReceipt = function () {
                if (!lastReceipt) return;
                const w = window.open('', '_blank', 'width=450,height=550');
                w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ደረሰኝ</title>
                <style>body{font-family:Nyala,sans-serif;padding:25px;max-width:400px;margin:auto}
                h2{color:#004d40;text-align:center}td{padding:6px;border-bottom:1px solid #ddd}
                .total{font-weight:bold;color:#004d40}</style></head><body>
                <h2>System 76 - ደረሰኝ</h2>
                <table>
                    <tr><td>ሰሌዳ</td><td>${lastReceipt.plate}</td></tr>
                    <tr><td>ቀን</td><td>${lastReceipt.date}</td></tr>
                    <tr><td>ዓይነት</td><td>${lastReceipt.vName}</td></tr>
                    <tr><td>ቦታ</td><td>${lastReceipt.location}</td></tr>
                    <tr><td>የተከፈለ</td><td>${lastReceipt.amount.toLocaleString()} ብር</td></tr>
                    <tr class="total"><td>ድምር</td><td>${lastReceipt.total.toLocaleString()} ብር</td></tr>
                    <tr><td>ደረሰኝ ቀን</td><td>${lastReceipt.rDate}</td></tr>
                </table>
                </body></html>`);
                w.document.close();
                w.focus();
                w.print();   // ንፁህ የማተሚያ ጥሪ
            };

            openDB().then(() => console.log('✅ ከዋና ሲስተም (IndexedDB) ጋር ተገናኝቷል'))
                .catch(e => console.error('ዳታቤዝ መክፈት አልተሳካም', e));
            console.log('🚗 System 76 ዝግጁ ነው - GitHub ላይ ለመጠቀም ዝግጁ');
        })();
    </script>
</body>

</html>
