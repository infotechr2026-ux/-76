<!DOCTYPE html>
<html lang="am">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#004d40">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Elite Inspection">
    <link rel="manifest" href="payment-manifest.json">
    <title>SYSTEM ELITE v76.0 - አጥንክሮ የተሰራ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #004d40;
            --secondary: #00796b;
            --accent: #ffb300;
            --danger: #ff1744;
            --success: #00c853;
            --info: #0288d1;
            --light: #f8fafc;
            --dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.95);
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --emergency: #ff0000;
            --duplicate: #2196F3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Nyala', 'Roboto', sans-serif;
            background: #eef2f7;
            color: var(--dark);
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 200, 83, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 200, 83, 0);
            }
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 23, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 23, 68, 0);
            }
        }

        @keyframes emergencyBlink {

            0%,
            100% {
                background: #ff0000;
                color: white;
            }

            50% {
                background: #ff6600;
                color: white;
            }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .online {
            background: #e8f5e9;
            color: var(--success);
            border: 1px solid var(--success);
            animation: pulse-green 2s infinite;
        }

        .offline {
            background: #ffebee;
            color: var(--danger);
            border: 1px solid var(--danger);
            animation: pulse-red 2s infinite;
        }

        #loginArea {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #00796b, #004d40);
        }

        .login-card {
            background: var(--glass);
            padding: 40px 30px;
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease-out;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            background: none;
            border: none;
            padding: 5px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: var(--transition);
            background: white;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(155, 230, 222, 0.1);
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        .container {
            display: none;
            padding: 20px;
            max-width: 1600px;
            margin: auto;
            animation: fadeIn 0.5s ease;
        }

        .header-card {
            background: white;
            padding: 20px 25px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: #f1f5f9;
            padding: 15px;
            color: #475569;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-box {
            padding: 25px;
            border-radius: 22px;
            background: white;
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 10px;
        }

        .stat-lbl {
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background: #333;
            color: white;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 10000;
            bottom: 30px;
            right: 30px;
        }

        #toast.show {
            visibility: visible;
            animation: fadeIn 0.4s ease forwards;
        }

        .lang-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: #ffffff;
            min-width: 280px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            border-radius: 0 0 18px 18px;
            padding: 15px;
            z-index: 9999;
            max-height: 80vh;
            overflow-y: auto;
        }

        .dropdown:hover .dropdown-content {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .dropdown-content button {
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .dropdown-content button:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        @media (max-width: 550px) {
            .grid-4 {
                grid-template-columns: 1fr 1fr;
            }

            .btn-action {
                padding: 10px 16px;
                font-size: 12px;
            }

            .header-card {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div id="toast">✅ መልዕክት</div>

    <div id="loginArea">
        <div class="login-card">
            <i class="fas fa-shield-halved fa-4x" style="color: var(--primary); margin-bottom: 20px;"></i>
            <h1 style="margin: 0; color: var(--primary); font-size: 22px;">ኢንስፔክሽን ስራ ሂደት</h1>
            <p style="color: #64748b; margin-bottom: 30px;">የቴክኒክ ምርመራ አስተዳደር ሲስተም</p>
            <div class="input-group">
                <input type="text" id="u" placeholder="የተጠቃሚ ስም" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="p" placeholder="የይለፍ ቃል" autocomplete="off">
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
                    <i class="fas fa-eye" id="pwToggleIcon"></i>
                </button>
            </div>
            <button class="btn-action" onclick="login()"
                style="background: var(--primary); color: white; width: 100%; font-size: 17px;">
                ሲስተም ግባ <i class="fas fa-sign-in-alt"></i>
            </button>
        </div>
    </div>

    <div id="mainApp" class="container">
        <div class="header-card">
            <div>
                <h2 style="margin:0; font-size: 20px;"><i class="fas fa-car-side"></i> Elite Inspection Pro</h2>
                <div style="display:flex; gap:12px; margin-top:8px;">
                    <div id="netStatus" class="status-indicator online"><i class="fas fa-circle"></i> <span
                            id="netText">ኦንላይን</span></div>
                    <span id="userBadge"
                        style="background:#f1f5f9; padding:6px 14px; border-radius:10px; font-weight:700;"></span>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="lang-btn" onclick="toggleLang('am')">AM</button>
                <button class="lang-btn" onclick="toggleLang('en')">EN</button>
                <div class="dropdown">
                    <button class="dropbtn">ተግባራት <i class="fas fa-chevron-down"></i></button>
                    <div class="dropdown-content">
                        <button onclick="syncAllToCloud()"><i class="fas fa-cloud-upload-alt"></i> ወደ ክላውድ ላክ</button>
                        <button onclick="exportExcel()"><i class="fas fa-file-export"></i> ኤክሴል አውርድ</button>
                        <button onclick="localBackup()"><i class="fas fa-hdd"></i> ሎካል ባካፕ</button>
                        <hr>
                        <button onclick="logout()"><i class="fas fa-power-off"></i> ሲስተሙን ዝጋ</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ፍለጋ ክፍል -->
        <div class="card grid-4">
            <input type="text" id="sPlate" placeholder="በሰሌዳ ፈልግ..." oninput="refresh()">
            <input type="text" id="sReceipt" placeholder="በደረሰኝ ፈልግ..." oninput="refresh()">
            <select id="sLoc" onchange="refresh()">
                <option value="">ሁሉም ቦታ</option>
                <option>ሰቲት</option>
                <option>ወልቃይት</option>
                <option>ዳንሻ</option>
                <option>ጠገዴ</option>
                <option>ዞን</option>
            </select>
            <select id="sStatus" onchange="refresh()">
                <option value="">ሁሉንም ውጤት</option>
                <option value="ችግር የለበትም">Pass</option>
                <option value="ችግር ያለበት">Fail</option>
            </select>
        </div>

        <!-- ግቤት ቅጽ -->
        <div id="inputFormCard" class="card grid-4" style="background: #f8fafc;">
            <input id="receipt" placeholder="ደረሰኝ ቁ.">
            <input id="plate" placeholder="ሰሌዳ">
            <input id="vType" placeholder="የተሽከርካሪ ዓይነት">
            <input id="pDate" type="text" placeholder="ቀን (DD/MM/YYYY)">
            <select id="loc">
                <option value="">ቦታ ምረጥ</option>
                <option>ሰቲት</option>
                <option>ወልቃይት</option>
                <option>ዳንሻ</option>
                <option>ጠገዴ</option>
                <option>ዞን</option>
            </select>
            <select id="status">
                <option value="ችግር የለበትም">Pass</option>
                <option value="ችግር ያለበት">Fail</option>
            </select>
            <input id="amt" type="number" placeholder="የክፍያ መጠን (ብር)">
            <div style="display: flex; gap: 10px;">
                <button id="saveBtn" onclick="save()" style="background:var(--primary); color:white; flex:1;"
                    class="btn-action">
                    <i class="fas fa-save"></i> Local
                </button>
                <button onclick="syncAllToCloud()" style="background:var(--success); color:white; flex:1;"
                    class="btn-action">
                    <i class="fas fa-cloud-upload-alt"></i> Cloud
                </button>
            </div>
        </div>

        <!-- ሰንጠረዥ -->
        <div class="card table-container">
            <table>
                <thead>
                    <tr>
                        <th>ተ.ቁ</th>
                        <th>ደረሰኝ</th>
                        <th>ሰሌዳ</th>
                        <th>ዓይነት</th>
                        <th>��ን</th>
                        <th>ቦታ</th>
                        <th>ምርመራ</th>
                        <th>ብር</th>
                        <th>እርምጃ</th>
                    </tr>
                </thead>
                <tbody id="mainTable"></tbody>
            </table>
        </div>

        <!-- ስታቲስቲክስ -->
        <div class="grid-4">
            <div class="stat-box"><span class="stat-lbl">ጠቅላላ ተሽከርካሪ</span><span id="uiCount" class="stat-val">0</span>
            </div>
            <div class="stat-box"><span class="stat-lbl">ጠቅላላ ገቢ (ብር)</span><span id="uiSum" class="stat-val">0</span>
            </div>
            <div class="stat-box"><span class="stat-lbl">ችግር የለለበት</span><span id="uiPassed" class="stat-val">0</span>
            </div>
            <div class="stat-box"><span class="stat-lbl">ችግር ያለበት</span><span id="uiFailed" class="stat-val">0</span>
            </div>
        </div>

        <input type="file" id="xlFile" hidden onchange="importExcel(event)">
    </div>

    <script>
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwzEJO_ilGL8sqFs4JqBhrc7ZyBq7LlRYaqurx0a4cp9UwntfVTr7CdM8ynn3O1gdbIAw/exec";
        const DB_NAME = 'TECH_INSPECTION_DB';
        let db, currentUser = null, allData = [];

        // ============ ኢትዮጵያ ወራት ============
        const ethiopianMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜን"];

        // ============ ቀን ማስተካከያ ============
        function normalizeDate(dateStr) {
            if (!dateStr) return '';
            let normalized = dateStr.trim();
            if (normalized.includes('(')) normalized = normalized.split('(')[0].trim();
            normalized = normalized.replace(/ዓ\.ም/g, '').replace(/\s+/g, '').trim();
            const parts = normalized.split('/');
            if (parts.length === 3) {
                let day = parts[0].padStart(2, '0');
                let month = parts[1].padStart(2, '0');
                let year = parseInt(parts[2]) < 100 ? '20' + parts[2] : parts[2];
                return `${day}/${month}/${year}`;
            }
            return normalized;
        }

        function formatDisplayDate(dateStr) {
            if (!dateStr) return '';
            let normalized = normalizeDate(dateStr);
            let parts = normalized.split('/');
            if (parts.length !== 3) return dateStr;
            let month = parseInt(parts[1], 10);
            let monthName = ethiopianMonths[month - 1] || "";
            return `${parts[0]}/${parts[1]}/${parts[2]} (${monthName})`;
        }

        // ============ በースይ ============
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('records')) d.createObjectStore('records', { keyPath: 'id', autoIncrement: true });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(); };
                req.onerror = () => reject('DB Error');
            });
        }

        async function loadData() {
            return new Promise(resolve => {
                const tx = db.transaction('records', 'readonly');
                const store = tx.objectStore('records');
                const req = store.getAll();
                req.onsuccess = () => { allData = req.result || []; resolve(allData); };
            });
        }

        function saveData(record) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('records', 'readwrite');
                const store = tx.objectStore('records');
                const req = store.add(record);
                req.onsuccess = () => resolve(true);
                req.onerror = () => reject(false);
            });
        }

        // ============ ሰሌዳ + ቀን ላይ ተመስርተው አዘምን ============
        async function updateByPlateAndDate(plate, date, amount, location, status, vType) {
            plate = (plate || '').toUpperCase().replace(/\s/g, '').replace(/-/g, '');
            date = normalizeDate(date);

            const normalized = normalizeDate(date);
            const existing = allData.find(r =>
                (r.plate || '').toUpperCase().replace(/\s/g, '').replace(/-/g, '') === plate &&
                normalizeDate(r.pDate) === normalized
            );

            if (existing) {
                // ብር ብቻ ጨምር - ሌሎች መረጃ ሳይቀንስ
                const oldAmount = parseFloat(existing.amt) || 0;
                existing.amt = oldAmount + amount;

                const tx = db.transaction('records', 'readwrite');
                const store = tx.objectStore('records');
                await new Promise(resolve => {
                    store.put(existing);
                    tx.oncomplete = () => resolve();
                });
            } else {
                // አዲስ ተጠቃሚ
                const newRecord = {
                    receipt: parseInt(Math.random() * 100000),
                    plate,
                    vType: vType || '',
                    pDate: date,
                    loc: location || '',
                    status: status || 'ችግር ያለበት',
                    amt: amount
                };
                await saveData(newRecord);
            }

            await loadData();
            refresh();
            showToast('✅ ተኩስታል');
        }

        // ============ ግቤት ============
        function save() {
            const receipt = document.getElementById('receipt').value.trim();
            const plate = document.getElementById('plate').value.trim();
            const vType = document.getElementById('vType').value.trim();
            const pDate = document.getElementById('pDate').value.trim();
            const loc = document.getElementById('loc').value;
            const status = document.getElementById('status').value;
            const amt = parseFloat(document.getElementById('amt').value);

            if (!plate || !pDate || !amt) {
                showToast('ሰሌዳ, ቀን, ብር ያስገቡ', false);
                return;
            }

            // ሰሌዳ + ቀን ሰርች
            plate_normalized = (plate || '').toUpperCase().replace(/\s/g, '').replace(/-/g, '');
            date_normalized = normalizeDate(pDate);
            const oldAmount = allData.filter(r =>
                (r.plate || '').toUpperCase().replace(/\s/g, '').replace(/-/g, '') === plate_normalized &&
                normalizeDate(r.pDate) === date_normalized
            ).reduce((sum, r) => sum + (parseFloat(r.amt) || 0), 0);

            const newTotal = oldAmount + amt;
            const msg = `ሰሌዳ: ${plate}\nቀን: ${pDate}\nቀድሞ: ${oldAmount} ብር\nአዲስ: ${amt} ብር\nጠቅላላ: ${newTotal} ብር\n\nእርግጠኛ?`;

            if (!confirm(msg)) return;

            updateByPlateAndDate(plate, pDate, amt, loc, status, vType);
        }

        // ============ ዝመና ============
        async function refresh() {
            await loadData();
            let filtered = allData;

            const sPlate = document.getElementById('sPlate').value.trim().toUpperCase();
            const sReceipt = document.getElementById('sReceipt').value.trim();
            const sLoc = document.getElementById('sLoc').value;
            const sStatus = document.getElementById('sStatus').value;

            if (sPlate) filtered = filtered.filter(r => (r.plate || '').toUpperCase().includes(sPlate));
            if (sReceipt) filtered = filtered.filter(r => String(r.receipt).includes(sReceipt));
            if (sLoc) filtered = filtered.filter(r => r.loc === sLoc);
            if (sStatus) filtered = filtered.filter(r => r.status === sStatus);

            // ሠንጠረዥ
            const table = document.getElementById('mainTable');
            table.innerHTML = '';
            filtered.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td>${row.receipt}</td>
                    <td>${row.plate}</td>
                    <td>${row.vType}</td>
                    <td>${formatDisplayDate(row.pDate)}</td>
                    <td>${row.loc}</td>
                    <td>${row.status}</td>
                    <td>${row.amt}</td>
                    <td><button onclick="deleteRecord(${row.id})" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">ሰርዝ</button></td>
                `;
                table.appendChild(tr);
            });

            // ስታቲስቲክስ
            const totalCount = filtered.length;
            const totalAmount = filtered.reduce((sum, r) => sum + (parseFloat(r.amt) || 0), 0);
            const passCount = filtered.filter(r => r.status === 'ችግር የለበትም').length;
            const failCount = filtered.filter(r => r.status === 'ችግር ያለበት').length;

            document.getElementById('uiCount').textContent = totalCount;
            document.getElementById('uiSum').textContent = totalAmount.toLocaleString();
            document.getElementById('uiPassed').textContent = passCount;
            document.getElementById('uiFailed').textContent = failCount;
        }

        function deleteRecord(id) {
            if (!confirm('ይህን ሰርዛል?')) return;
            const tx = db.transaction('records', 'readwrite');
            const store = tx.objectStore('records');
            store.delete(id);
            tx.oncomplete = () => {
                showToast('✅ ተሰርዧል');
                refresh();
            };
        }

        // ============ ሎግይን ============
        function login() {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('p').value;

            // ንቁ ተጠቃሚዎች
            const users = {
                'admin': 'admin123',
                'user1': 'user123',
                'user2': 'user123',
                'werku': '9999'
            };

            if (users[u] === p) {
                currentUser = u;
                sessionStorage.setItem('inspectUser', u);
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userBadge').textContent = `👤 ${u.toUpperCase()}`;
                refresh();
                showToast('እንኳን ደህና መጡ!');
            } else {
                showToast('ስህተት ኃላፊ ወይም ይለፍ ቃል', false);
            }
        }

        function logout() {
            sessionStorage.removeItem('inspectUser');
            location.reload();
        }

        function showToast(msg, isGood = true) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isGood ? '#2e7d32' : '#d32f2f';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function togglePasswordVisibility() {
            const inp = document.getElementById('p');
            const icon = document.getElementById('pwToggleIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                inp.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function toggleLang(lang) {
            // ለወደፊት ተግባር
        }

        async function syncAllToCloud() {
            showToast('ወደ ክላውድ እንደገና...');
            try {
                const response = await fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ operation: 'add', data: allData })
                });
                showToast('☁️ ወደ ክላውድ ተልኳል!');
            } catch (e) {
                showToast('ክላውድ ስህተት', false);
            }
        }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(allData.map(r => ({
                'ተ.ቁ': r.id,
                'ደረሰኝ': r.receipt,
                'ሰሌዳ': r.plate,
                'ዓይነት': r.vType,
                'ቀን': r.pDate,
                'ቦታ': r.loc,
                'ምርመራ': r.status,
                'ብር': r.amt
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'ውሂብ');
            XLSX.writeFile(wb, 'ጋራ_' + new Date().toISOString().split('T')[0] + '.xlsx');
            showToast('✅ ኤክሴል አውርድ ተጠናቅቀ');
        }

        function localBackup() {
            const data = JSON.stringify(allData);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            showToast('✅ ባካፕ ተከናወነ');
        }

        // ============ መጀመር ============
        (async () => {
            await openDB();
            if (sessionStorage.getItem('inspectUser')) {
                currentUser = sessionStorage.getItem('inspectUser');
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userBadge').textContent = `👤 ${currentUser.toUpperCase()}`;
                await refresh();
            }
        })();

        // ============ አውታረ መረብ ፍለጋ ============
        window.addEventListener('online', () => {
            document.getElementById('netStatus').className = 'status-indicator online';
            document.getElementById('netText').textContent = 'ኦንላይን';
        });
        window.addEventListener('offline', () => {
            document.getElementById('netStatus').className = 'status-indicator offline';
            document.getElementById('netText').textContent = 'ኦፍላይን';
        });
    </script>
</body>
