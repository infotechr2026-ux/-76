      --secondary: #00796b;

  <!-- Main Application Script -->
  <script>
    (function() {
      'use strict';
      
      // ========== የኢትዮጵያ ቀን መቁጠሪያ ==========
      const EthCal = {
        toJDN: function(d, m, y) {
          return 1724221 + 365 * (y - 1) + Math.floor(y / 4) + 30 * m + d - 31;
        },
        
        jdnToGreg: function(jdn) {
          let l = jdn + 68569;
          let n = Math.floor(4 * l / 146097);
          l -= Math.floor((146097 * n + 3) / 4);
          let i = Math.floor(4000 * (l + 1) / 1461001);
          l = l - Math.floor(1461 * i / 4) + 31;
          let j = Math.floor(80 * l / 2447);
          let day = l - Math.floor(2447 * j / 80);
          l = Math.floor(j / 11);
          return { year: 100 * (n - 49) + i + l, month: j + 2 - 12 * l, day: day };
        },
        
        toGreg: function(d, m, y) {
          return this.jdnToGreg(this.toJDN(d, m, y));
        },
        
        fromGreg: function(y, m, d) {
          const jdn = Math.floor((y + Math.floor((m - 14) / 12)) * 365.25) + 
                      Math.floor(30.6001 * ((m % 12) + 1)) + d + 1720995;
          const r = jdn - 1724221;
          const n = Math.floor(r / 146097);
          const rem = r % 146097;
          const yp = Math.floor(rem / 365.25);
          const dp = (rem % 365.25);
          return { year: n * 400 + yp + 1, month: Math.floor(dp / 30) + 1, day: Math.floor(dp % 30) + 1 };
        },
        
        todayEth: function() {
          const t = new Date();
          return this.fromGreg(t.getFullYear(), t.getMonth() + 1, t.getDate());
        },
        
        workingDays: function(dateStr) {
          const p = dateStr.split('/');
          if (p.length !== 3) return -1;
          const d = parseInt(p[0]), m = parseInt(p[1]), y = parseInt(p[2]);
          if (isNaN(d) || isNaN(m) || isNaN(y)) return -1;
          
          const g = this.toGreg(d, m, y);
          const start = new Date(g.year, g.month - 1, g.day);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          
          let cnt = 0;
          let cur = new Date(start);
          cur.setDate(cur.getDate() + 1);
          
          while (cur <= today) {
            const dow = cur.getDay();
            if (dow !== 0 && dow !== 6) cnt++;
            cur.setDate(cur.getDate() + 1);
          }
          return cnt;
        }
      };
      
      // ========== የክፍያ ሰንጠረዥ ==========
      const Fees = {
        '2.3.1': { name: 'ሞተር/ባጃጅ', rates: [400, 600, 800] },
        '2.3.2': { name: 'አነስተኛ', rates: [600, 800, 1000] },
        '2.3.3': { name: 'መለስተኛ', rates: [800, 1000, 1200] },
        '2.3.4': { name: 'ከፍተኛ', rates: [1000, 1200, 1500] },
        '2.3.5': { name: 'ደረቅ 1', rates: [800, 1000, 1200] },
        '2.3.6': { name: 'ደረቅ 2', rates: [1000, 1200, 2000] },
        '2.3.7': { name: 'ደረቅ 3', rates: [1000, 2500, 3500] },
        '2.3.8': { name: 'ከባድ', rates: [1500, 3000, 4000] },
        '2.3.9': { name: 'ፈሳሽ', rates: [1000, 2500, 3500] }
      };
      
      // ========== ዳታቤዝ ==========
      const DB_KEY = 'SYS76_PAYMENTS';
      
      function getDB() {
        try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }
        catch(e) { return []; }
      }
      
      function saveDB(data) {
        localStorage.setItem(DB_KEY, JSON.stringify(data));
      }
      
      function norm(s) { return (s||'').toString().trim().toUpperCase().replace(/[- ]/g, ''); }
      
      /**
       * ክፍያ የሚጨምረው ሰሌዳ + ቀን ቀድሞ ካለ ብቻ ነው።
       * @returns {boolean} ተዛማጅ ከተገኘ እና ከተሳካ true፣ ካልተገኘ false።
       */
      function addPaymentToExisting(plate, date, amt, loc, vType, vName) {
        const db = getDB();
        const np = norm(plate), nd = date.trim();
        const idx = db.findIndex(r => norm(r.plate) === np && r.date.trim() === nd);
        
        if (idx >= 0) {
          // 🔒 ተዛማጅ አለ – መጠኑን ብቻ ጨምር
          db[idx].amount = (parseFloat(db[idx].amount) || 0) + amt;
          db[idx].location = loc;
          db[idx].vType = vType;
          db[idx].vName = vName;
          db[idx].updated = new Date().toISOString();
          saveDB(db);
          return true;
        } else {
          return false; // መረጃው የለም
        }
      }
      
      function getTotal(plate, date) {
        const db = getDB();
        const r = db.find(r => norm(r.plate) === norm(plate) && r.date.trim() === date.trim());
        return r ? r.amount : 0;
      }
      
      // ========== UI ተለዋዋጮች ==========
      const $ = (id) => document.getElementById(id);
      const plateEl = $('plateInput');
      const dateEl = $('dateInput');
      const typeEl = $('vehicleType');
      const locEl = $('locationSelect');
      const amtBox = $('calculatedAmount');
      const feeInfo = $('feeBreakdown');
      const receipt = $('receiptCard');
      const receiptBody = $('receiptContent');
      const toastEl = $('toast');
      
      let toastTimer;
      let currentFee = null;
      let lastReceipt = null;
      
      function toast(msg, cls) {
        toastEl.textContent = msg;
        toastEl.className = 'toast ' + (cls||'success');
        toastEl.classList.add('visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 2800);
      }
      
      function calcFee() {
        const v = typeEl.value;
        const d = dateEl.value.trim();
        
        if (!v || !d) {
          amtBox.textContent = '--';
          amtBox.classList.remove('highlight');
          feeInfo.classList.remove('visible');
          currentFee = null;
          return;
        }
        
        const days = EthCal.workingDays(d);
        if (days < 0) {
          amtBox.textContent = 'ቀን አልተገኘም';
          amtBox.classList.remove('highlight');
          feeInfo.classList.remove('visible');
          currentFee = null;
          return;
        }
        
        const f = Fees[v];
        if (!f) { currentFee = null; return; }
        
        let amount, range;
        if (days <= 7) { amount = f.rates[0]; range = '0-7 ቀናት'; }
        else if (days <= 15) { amount = f.rates[1]; range = '8-15 ቀናት'; }
        else { amount = f.rates[2]; range = 'ከ15 በላይ'; }
        
        currentFee = amount;
        amtBox.textContent = amount.toLocaleString() + ' ብር';
        amtBox.classList.add('highlight');
        
        feeInfo.innerHTML = '📅 የስራ ቀናት: <b>' + days + '</b> (' + range + ')<br>🚗 ዓይነት: <b>' + f.name + '</b><br>💰 ተመን: <b>' + amount.toLocaleString() + ' ብር</b>';
        feeInfo.classList.add('visible');
      }
      
      typeEl.addEventListener('change', calcFee);
      dateEl.addEventListener('input', calcFee);
      
      window.processPayment = function() {
        const plate = plateEl.value.trim();
        const date = dateEl.value.trim();
        const vType = typeEl.value;
        const loc = locEl.value;
        
        if (!plate) { toast('ሰሌዳ ያስገቡ', 'error'); plateEl.focus(); return; }
        if (!date) { toast('ቀን ያስገቡ', 'error'); dateEl.focus(); return; }
        if (!vType) { toast('ዓይነት ይምረጡ', 'error'); typeEl.focus(); return; }
        if (!currentFee) { toast('ቀንና ዓይነት ያረጋግጡ', 'error'); return; }
        
        // 1. መጀመሪያ ማች መኖሩን ፈትሽ
        const prev = getTotal(plate, date);
        const found = prev > 0 || getDB().some(r => norm(r.plate) === norm(plate) && r.date.trim() === date.trim());
        // (መረጃ ካለ getTotal >0 ወይም ዜሮ ሊሆን ይችላል፤ ቀዳሚ ሪከርድ መኖሩን በትክክል ማወቅ)
        // ደህንነቱ የተጠበቀ ምርመራ በ addPaymentToExisting እንደሚሰራ እናስተማምን
        // 2. ክፍያ ለማከል ሞክር
        const vName = Fees[vType]?.name || vType;
        const success = addPaymentToExisting(plate, date, currentFee, loc, vType, vName);
        
        if (!success) {
          // ❌ ተዛማጅ አልተገኘም
          toast('መረጃው በሲስተሙ ውስጥ የለም፤ እባክዎ የተሽከርካሪውን ሙሉ መረጃ ያስገቡ', 'error');
          return;
        }
        
        // ✅ ከተከፈለ በኋላ ደረሰኝ አሳይ
        const newTotal = prev + currentFee;
        const eth = EthCal.todayEth();
        lastReceipt = {
          plate, date, amount: currentFee, total: newTotal,
          location: loc, vName, rDate: eth.day + '/' + eth.month + '/' + eth.year
        };
        
        receiptBody.innerHTML = '<table>' +
          '<tr><td>ሰሌዳ</td><td><b>' + plate + '</b></td></tr>' +
          '<tr><td>ቀን</td><td>' + date + '</td></tr>' +
          '<tr><td>ዓይነት</td><td>' + vName + '</td></tr>' +
          '<tr><td>ቦታ</td><td>' + loc + '</td></tr>' +
          '<tr><td>የተከፈለ</td><td style="color:#2e7d32;font-weight:900;">' + currentFee.toLocaleString() + ' ብር</td></tr>' +
          '<tr><td>ድምር</td><td><b>' + newTotal.toLocaleString() + ' ብር</b></td></tr>' +
          '<tr><td>ደረሰኝ ቀን</td><td>' + lastReceipt.rDate + '</td></tr>' +
          '</table>';
        
        receipt.classList.add('show');
        receipt.scrollIntoView({ behavior: 'smooth' });
        toast('✅ ' + currentFee.toLocaleString() + ' ብር ተከፍሏል');
      };
      
      window.resetForm = function() {
        plateEl.value = '';
        dateEl.value = '';
        typeEl.value = '';
        amtBox.textContent = '--';
        amtBox.classList.remove('highlight');
        feeInfo.classList.remove('visible');
        receipt.classList.remove('show');
        currentFee = null;
        lastReceipt = null;
        plateEl.focus();
      };
      
      // WhatsApp, Telegram, Print ያልተቀየሩ ናቸው
      window.shareWhatsApp = function() {
        if (!lastReceipt) return;
        const m = '✅ *System 76*%0A' +
          'ሰሌዳ: ' + lastReceipt.plate + '%0A' +
          'ቀን: ' + lastReceipt.date + '%0A' +
          'የተከፈለ: ' + lastReceipt.amount.toLocaleString() + ' ብር%0A' +
          'ድምር: ' + lastReceipt.total.toLocaleString() + ' ብር';
        window.open('https://wa.me/?text=' + m, '_blank');
      };
      
      window.shareTelegram = function() {
        if (!lastReceipt) return;
        const m = '✅ System 76\n' +
          'ሰሌዳ: ' + lastReceipt.plate + '\n' +
          'ቀን: ' + lastReceipt.date + '\n' +
          'የተከፈለ: ' + lastReceipt.amount.toLocaleString() + ' ብር\n' +
          'ድምር: ' + lastReceipt.total.toLocaleString() + ' ብር';
        window.open('https://t.me/share/url?url=&text=' + encodeURIComponent(m), '_blank');
      };
      
      window.printReceipt = function() {
        if (!lastReceipt) return;
        const w = window.open('', '_blank', 'width=450,height=550');
        w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ደረሰኝ</title>' +
          '<style>body{font-family:Nyala,sans-serif;padding:25px;max-width:400px;margin:auto}' +
          'h2{color:#004d40;text-align:center}td{padding:6px;border-bottom:1px solid #ddd}' +
          '.total{font-weight:bold;color:#004d40}</style></head><body>' +
          '<h2>System 76 - ደረሰኝ</h2><table>' +
          '<tr><td>ሰሌዳ</td><td>' + lastReceipt.plate + '</td></tr>' +
          '<tr><td>ቀን</td><td>' + lastReceipt.date + '</td></tr>' +
          '<tr><td>ዓይነት</td><td>' + lastReceipt.vName + '</td></tr>' +
          '<tr><td>ቦታ</td><td>' + lastReceipt.location + '</td></tr>' +
          '<tr><td>የተከፈለ</td><td>' + lastReceipt.amount.toLocaleString() + ' ብር</td></tr>' +
          '<tr class="total"><td>ድምር</td><td>' + lastReceipt.total.toLocaleString() + ' ብር</td></tr>' +
          '<tr><td>ደረሰኝ ቀን</td><td>' + lastReceipt.rDate + '</td></tr>' +
          '</table><script>window.onload=function(){window.print()}');
        w.document.close();
      };
      
      console.log('🚗 System 76 ዝግጁ ነው - ማች ካለ ብቻ ክፍያ ይጨምራል');
    })();
  </script>
</body>
</html>
